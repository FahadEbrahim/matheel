name: Sync Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "gradio_app/**"
      - ".github/workflows/sync-hf-space.yml"
  workflow_run:
    workflows:
      - Publish
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-space-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Space files
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify Gradio app version references
        run: python scripts/sync_gradio_app_version.py --check

      - name: Check pinned Matheel release on PyPI
        id: pinned-release
        timeout-minutes: 12
        run: python scripts/check_pinned_matheel_release.py

      - name: Set up uv
        if: steps.pinned-release.outputs.should_sync_space == 'true'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync Gradio app to Hugging Face Space
        if: steps.pinned-release.outputs.should_sync_space == 'true'
        env:
          HF_REPO_ID: ${{ vars.HF_SPACE_REPO || 'buelfhood/matheel-framework' }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          uvx hf repo create "${HF_REPO_ID}" --repo-type space --space-sdk gradio --exist-ok
          uvx hf upload \
            "${HF_REPO_ID}" \
            gradio_app \
            --repo-type space \
            --exclude=".git*" \
            --exclude=".github*" \
            --delete="*" \
            --commit-message="Sync from GitHub Actions"
