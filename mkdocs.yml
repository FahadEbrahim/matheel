site_name: Matheel
site_description: Documentation for Matheel source-code similarity workflows.
site_url: https://fahadebrahim.github.io/matheel/
repo_url: https://github.com/FahadEbrahim/matheel
repo_name: FahadEbrahim/matheel
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: readthedocs
  highlightjs: true

nav:
  - Home: index.md
  - Usage: usage.md
  - Preprocessing: preprocessing.md
  - Tokenization and limits: tokenization.md
  - Chunking: chunking.md
  - Vectors and routing: vectors.md
  - Lexical metrics and baselines: lexical.md
  - Code metrics: code_metrics.md
  - Scoring and calibration: scoring.md
  - Datasets and evaluation: datasets.md
  - Comparison suite: comparison_suite.md
  - Development: development.md

exclude_docs: |
  README.md
  release_backlog.md
